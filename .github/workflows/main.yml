name: Deploy to Azure VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # 1. Create a folder for our project on the server
            mkdir -p ~/my-app
            cd ~/my-app

            # 2. Download your latest code from GitHub to the server
            sudo wget -O index.html https://raw.githubusercontent.com/${{ github.repository }}/main/index.html
            sudo wget -O Dockerfile https://raw.githubusercontent.com/${{ github.repository }}/main/Dockerfile

            # 3. Stop and Remove the old "Welcome" container
            sudo docker stop devops-container || true
            sudo docker rm devops-container || true

            # 4. Build YOUR custom image using the Dockerfile
            sudo docker build -t my-custom-site .

            # 5. Run YOUR custom image
            sudo docker run -d -p 80:80 --name devops-container my-custom-site
